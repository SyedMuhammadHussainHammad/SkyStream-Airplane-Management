<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyStream Airlines - 3D Aircraft Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #162245;
            color: #ffffff;
            overflow: hidden;
        }

        #airplane-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #162245 0%, #0a1628 100%);
        }

        #airplane-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        .ui-overlay > * {
            pointer-events: auto;
        }

        /* Top Navigation */
        .top-nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(10, 22, 40, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 146, 42, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 200;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
            color: #c9922a;
        }

        .nav-controls {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(201, 146, 42, 0.1);
            border: 1px solid rgba(201, 146, 42, 0.3);
            color: #c9922a;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-btn:hover {
            background: rgba(201, 146, 42, 0.2);
            border-color: #c9922a;
            transform: translateY(-2px);
        }

        /* Aircraft Info Panel */
        .aircraft-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: rgba(31, 42, 61, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(203, 213, 225, 0.1);
            border-radius: 16px;
            padding: 24px;
            min-width: 320px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .aircraft-info.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .aircraft-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .aircraft-subtitle {
            color: #cbd5e1;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .aircraft-specs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .spec-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .spec-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .spec-value {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
        }

        /* Seat Selection Panel */
        .seat-panel {
            position: absolute;
            top: 80px;
            right: -400px;
            width: 380px;
            height: calc(100vh - 80px);
            background: rgba(31, 42, 61, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(203, 213, 225, 0.1);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .seat-panel.open {
            right: 0;
        }

        .seat-panel-header {
            padding: 24px;
            border-bottom: 1px solid rgba(203, 213, 225, 0.1);
        }

        .seat-panel-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .seat-panel-subtitle {
            color: #cbd5e1;
            font-size: 14px;
        }

        .seat-map {
            padding: 24px;
        }

        .seat-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .row-number {
            width: 30px;
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            font-weight: 600;
        }

        .seat {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 600;
            position: relative;
        }

        .seat.available {
            background: rgba(203, 213, 225, 0.1);
            border: 1px solid rgba(203, 213, 225, 0.3);
            color: #cbd5e1;
        }

        .seat.available:hover {
            background: rgba(201, 146, 42, 0.2);
            border-color: #c9922a;
            color: #c9922a;
            transform: scale(1.1);
        }

        .seat.selected {
            background: #c9922a;
            border: 1px solid #e8b84b;
            color: #0a1628;
        }

        .seat.occupied {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #fca5a5;
            cursor: not-allowed;
        }

        .aisle {
            width: 20px;
        }

        /* Loading Screen */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #162245;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid rgba(201, 146, 42, 0.2);
            border-top: 3px solid #c9922a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .loading-text {
            color: #cbd5e1;
            font-size: 16px;
            font-weight: 500;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Controls Help */
        .controls-help {
            position: absolute;
            bottom: 40px;
            right: 40px;
            background: rgba(31, 42, 61, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(203, 213, 225, 0.1);
            border-radius: 12px;
            padding: 16px;
            font-size: 12px;
            color: #94a3b8;
            max-width: 200px;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .control-item:last-child {
            margin-bottom: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-nav {
                padding: 0 20px;
            }

            .aircraft-info {
                left: 20px;
                right: 20px;
                bottom: 20px;
                min-width: auto;
            }

            .seat-panel {
                width: 100%;
                right: -100%;
            }

            .controls-help {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="airplane-container">
        <!-- Loading Screen -->
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <div class="loading-text">Loading SkyStream Experience...</div>
        </div>

        <!-- 3D Canvas -->
        <canvas id="airplane-canvas"></canvas>

        <!-- UI Overlay -->
        <div class="ui-overlay">
            <!-- Top Navigation -->
            <div class="top-nav">
                <div class="logo">
                    <i data-lucide="plane"></i>
                    SkyStream Airlines
                </div>
                <div class="nav-controls">
                    <button class="nav-btn" onclick="toggleSeatSelection()">
                        <i data-lucide="users"></i>
                        Choose Seats
                    </button>
                    <button class="nav-btn" onclick="resetCamera()">
                        <i data-lucide="rotate-ccw"></i>
                        Reset View
                    </button>
                    <button class="nav-btn" onclick="goBack()">
                        <i data-lucide="arrow-left"></i>
                        Back to Booking
                    </button>
                </div>
            </div>

            <!-- Aircraft Info Panel -->
            <div class="aircraft-info" id="aircraftInfo">
                <div class="aircraft-title">Boeing 787-9 Dreamliner</div>
                <div class="aircraft-subtitle">SkyStream Premium Fleet</div>
                <div class="aircraft-specs">
                    <div class="spec-item">
                        <div class="spec-label">Capacity</div>
                        <div class="spec-value">296 Seats</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Range</div>
                        <div class="spec-value">14,800 km</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Max Speed</div>
                        <div class="spec-value">945 km/h</div>
                    </div>
                    <div class="spec-item">
                        <div class="spec-label">Service Ceiling</div>
                        <div class="spec-value">13,100 m</div>
                    </div>
                </div>
                <button class="nav-btn" onclick="toggleSeatSelection()" style="width: 100%;">
                    <i data-lucide="map-pin"></i>
                    Explore Cabin Interior
                </button>
            </div>

            <!-- Seat Selection Panel -->
            <div class="seat-panel" id="seatPanel">
                <div class="seat-panel-header">
                    <div class="seat-panel-title">Select Your Seat</div>
                    <div class="seat-panel-subtitle">Boeing 787-9 • Flight SS-1001</div>
                </div>
                <div class="seat-map" id="seatMap">
                    <!-- Seat map will be generated by JavaScript -->
                </div>
            </div>

            <!-- Controls Help -->
            <div class="controls-help">
                <div class="control-item">
                    <span>Rotate:</span>
                    <span>Mouse Drag</span>
                </div>
                <div class="control-item">
                    <span>Zoom:</span>
                    <span>Mouse Wheel</span>
                </div>
                <div class="control-item">
                    <span>Pan:</span>
                    <span>Right Click + Drag</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Global variables
        let scene, camera, renderer, airplane, controls;
        let seatPanelOpen = false;
        let selectedSeats = [];
        let animationId;

        // Initialize the 3D scene
        function init() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x162245, 50, 200);

            // Camera setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            // Renderer setup
            const canvas = document.getElementById('airplane-canvas');
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true, 
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;

            // Controls setup
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 50;
            controls.maxPolarAngle = Math.PI / 1.5;

            // Lighting setup
            setupLighting();

            // Create skybox
            createSkybox();

            // Create airplane
            createAirplane();

            // Generate seat map
            generateSeatMap();

            // Start animation loop
            animate();

            // Show aircraft info after a delay
            setTimeout(() => {
                document.getElementById('aircraftInfo').classList.add('visible');
                hideLoadingScreen();
            }, 2000);
        }

        function setupLighting() {
            // Ambient light
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);

            // Main directional light (sun)
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 100;
            directionalLight.shadow.camera.left = -20;
            directionalLight.shadow.camera.right = 20;
            directionalLight.shadow.camera.top = 20;
            directionalLight.shadow.camera.bottom = -20;
            scene.add(directionalLight);

            // Fill light
            const fillLight = new THREE.DirectionalLight(0x87ceeb, 0.4);
            fillLight.position.set(-10, 5, -10);
            scene.add(fillLight);

            // Rim light
            const rimLight = new THREE.DirectionalLight(0xc9922a, 0.3);
            rimLight.position.set(0, 10, -20);
            scene.add(rimLight);
        }

        function createSkybox() {
            // Create animated cloud particles
            const cloudGeometry = new THREE.SphereGeometry(2, 8, 6);
            const cloudMaterial = new THREE.MeshLambertMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.1
            });

            for (let i = 0; i < 50; i++) {
                const cloud = new THREE.Mesh(cloudGeometry, cloudMaterial);
                cloud.position.set(
                    (Math.random() - 0.5) * 200,
                    Math.random() * 50 + 20,
                    (Math.random() - 0.5) * 200
                );
                cloud.scale.setScalar(Math.random() * 3 + 1);
                scene.add(cloud);
            }

            // Skybox gradient
            const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
            const skyMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0077be) },
                    bottomColor: { value: new THREE.Color(0x162245) },
                    offset: { value: 33 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });

            const sky = new THREE.Mesh(skyGeometry, skyMaterial);
            scene.add(sky);
        }

        function createAirplane() {
            // Create a simplified airplane geometry
            const airplaneGroup = new THREE.Group();

            // Fuselage
            const fuselageGeometry = new THREE.CylinderGeometry(1.5, 1.2, 20, 16);
            const fuselageMaterial = new THREE.MeshPhongMaterial({
                color: 0xf0f0f0,
                shininess: 100,
                reflectivity: 0.3
            });
            const fuselage = new THREE.Mesh(fuselageGeometry, fuselageMaterial);
            fuselage.rotation.z = Math.PI / 2;
            fuselage.castShadow = true;
            fuselage.receiveShadow = true;
            airplaneGroup.add(fuselage);

            // Wings
            const wingGeometry = new THREE.BoxGeometry(16, 0.3, 3);
            const wingMaterial = new THREE.MeshPhongMaterial({
                color: 0xe0e0e0,
                shininess: 100
            });
            const wings = new THREE.Mesh(wingGeometry, wingMaterial);
            wings.position.z = -2;
            wings.castShadow = true;
            airplaneGroup.add(wings);

            // Tail
            const tailGeometry = new THREE.BoxGeometry(0.5, 4, 3);
            const tail = new THREE.Mesh(tailGeometry, wingMaterial);
            tail.position.x = -9;
            tail.position.y = 2;
            tail.castShadow = true;
            airplaneGroup.add(tail);

            // Engines
            const engineGeometry = new THREE.CylinderGeometry(0.8, 0.8, 3, 12);
            const engineMaterial = new THREE.MeshPhongMaterial({
                color: 0xd0d0d0,
                shininess: 150
            });

            const engine1 = new THREE.Mesh(engineGeometry, engineMaterial);
            engine1.position.set(0, -1.5, -4);
            engine1.rotation.z = Math.PI / 2;
            engine1.castShadow = true;
            airplaneGroup.add(engine1);

            const engine2 = new THREE.Mesh(engineGeometry, engineMaterial);
            engine2.position.set(0, -1.5, 0);
            engine2.rotation.z = Math.PI / 2;
            engine2.castShadow = true;
            airplaneGroup.add(engine2);

            // SkyStream livery
            const logoGeometry = new THREE.PlaneGeometry(4, 1);
            const logoMaterial = new THREE.MeshBasicMaterial({
                color: 0xc9922a,
                transparent: true,
                opacity: 0.8
            });
            const logo = new THREE.Mesh(logoGeometry, logoMaterial);
            logo.position.set(2, 1.6, 0);
            logo.rotation.y = Math.PI / 2;
            airplaneGroup.add(logo);

            airplane = airplaneGroup;
            scene.add(airplane);

            // Add subtle rotation animation
            airplane.userData = { rotationSpeed: 0.002 };
        }

        function generateSeatMap() {
            const seatMap = document.getElementById('seatMap');
            seatMap.innerHTML = '';

            // Boeing 787-9 configuration: 28 Business + 268 Economy
            const businessRows = 7; // Rows 1-7
            const economyRows = 35; // Rows 8-42

            // Business class (2-2-2 configuration)
            for (let row = 1; row <= businessRows; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'seat-row';

                const rowNumber = document.createElement('div');
                rowNumber.className = 'row-number';
                rowNumber.textContent = row;
                rowDiv.appendChild(rowNumber);

                const seats = ['A', 'C', '', 'D', 'F']; // '' represents aisle
                seats.forEach(seatLetter => {
                    if (seatLetter === '') {
                        const aisle = document.createElement('div');
                        aisle.className = 'aisle';
                        rowDiv.appendChild(aisle);
                    } else {
                        const seat = createSeat(row, seatLetter, 'business');
                        rowDiv.appendChild(seat);
                    }
                });

                seatMap.appendChild(rowDiv);
            }

            // Economy class (3-3-3 configuration)
            for (let row = 8; row <= 42; row++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'seat-row';

                const rowNumber = document.createElement('div');
                rowNumber.className = 'row-number';
                rowNumber.textContent = row;
                rowDiv.appendChild(rowNumber);

                const seats = ['A', 'B', 'C', '', 'D', 'E', 'F', '', 'G', 'H', 'J'];
                seats.forEach(seatLetter => {
                    if (seatLetter === '') {
                        const aisle = document.createElement('div');
                        aisle.className = 'aisle';
                        rowDiv.appendChild(aisle);
                    } else {
                        const seat = createSeat(row, seatLetter, 'economy');
                        rowDiv.appendChild(seat);
                    }
                });

                seatMap.appendChild(rowDiv);
            }
        }

        function createSeat(row, letter, seatClass) {
            const seat = document.createElement('div');
            seat.className = 'seat available';
            seat.textContent = letter;
            seat.dataset.seat = `${row}${letter}`;
            seat.dataset.class = seatClass;

            // Randomly make some seats occupied for demo
            if (Math.random() < 0.3) {
                seat.className = 'seat occupied';
            }

            seat.addEventListener('click', () => selectSeat(seat));
            return seat;
        }

        function selectSeat(seatElement) {
            if (seatElement.classList.contains('occupied')) return;

            const seatId = seatElement.dataset.seat;

            if (seatElement.classList.contains('selected')) {
                // Deselect seat
                seatElement.classList.remove('selected');
                seatElement.classList.add('available');
                selectedSeats = selectedSeats.filter(seat => seat !== seatId);
            } else {
                // Select seat (limit to 1 for demo)
                if (selectedSeats.length < 1) {
                    seatElement.classList.remove('available');
                    seatElement.classList.add('selected');
                    selectedSeats.push(seatId);
                }
            }

            console.log('Selected seats:', selectedSeats);
        }

        function toggleSeatSelection() {
            seatPanelOpen = !seatPanelOpen;
            const seatPanel = document.getElementById('seatPanel');
            
            if (seatPanelOpen) {
                seatPanel.classList.add('open');
                // Zoom into cabin view
                controls.target.set(0, 0, 0);
                camera.position.set(0, 2, 8);
            } else {
                seatPanel.classList.remove('open');
                // Return to exterior view
                resetCamera();
            }
        }

        function resetCamera() {
            controls.target.set(0, 0, 0);
            camera.position.set(0, 5, 15);
            seatPanelOpen = false;
            document.getElementById('seatPanel').classList.remove('open');
        }

        function goBack() {
            // Airplane flies away animation
            if (airplane) {
                const flyAway = () => {
                    airplane.position.z -= 2;
                    airplane.position.y += 0.5;
                    airplane.rotation.x += 0.02;
                    
                    if (airplane.position.z > -100) {
                        requestAnimationFrame(flyAway);
                    } else {
                        // Redirect back to booking page
                        window.location.href = '/search'; // Adjust URL as needed
                    }
                };
                flyAway();
            }
        }

        function hideLoadingScreen() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.style.opacity = '0';
            setTimeout(() => {
                loadingScreen.style.display = 'none';
            }, 500);
        }

        function animate() {
            animationId = requestAnimationFrame(animate);

            // Update controls
            controls.update();

            // Subtle airplane rotation
            if (airplane && !seatPanelOpen) {
                airplane.rotation.y += airplane.userData.rotationSpeed;
            }

            // Animate clouds
            scene.children.forEach(child => {
                if (child.material && child.material.transparent && child.material.opacity < 0.2) {
                    child.position.x += 0.02;
                    if (child.position.x > 100) {
                        child.position.x = -100;
                    }
                }
            });

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize when page loads
        window.addEventListener('load', init);

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        });
    </script>
</body>
</html>
