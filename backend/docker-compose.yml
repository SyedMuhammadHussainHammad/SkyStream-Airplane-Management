version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: skystream_user
      POSTGRES_PASSWORD: skystream_password
      POSTGRES_DB: skystream_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://skystream_user:skystream_password@db:5432/skystream_db
    depends_on:
      - db

volumes:
  postgres_data: