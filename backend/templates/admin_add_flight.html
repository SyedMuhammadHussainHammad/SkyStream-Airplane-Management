{% extends "base.html" %}
{% block title %}Add Flight{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-up px-4 sm:px-0">

    <!-- Header -->
    <div class="mb-8">
        <a href="{{ url_for('admin_dashboard') }}" 
           class="text-sm font-medium text-gold hover:text-gold-light transition-colors">
           ← Back to Dashboard
        </a>

        <h1 class="text-3xl font-display font-black text-slate-900 dark:text-white mt-2 mb-1">
            Add New Flight
        </h1>

        <p class="text-slate-500 dark:text-slate-400 text-sm">
            Schedule a new flight on an available aircraft.
        </p>
    </div>

    <!-- Card -->
    <div class="card p-6 sm:p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-sm rounded-2xl">

        <form method="POST" action="{{ url_for('admin_add_flight') }}" id="add-flight-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="space-y-6">

                <!-- Plane -->
                <div>
                    <label for="plane_id" 
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        Aircraft
                    </label>

                    <select name="plane_id" id="plane_id" required
                        class="w-full border border-slate-200 dark:border-slate-700 
                               bg-white dark:bg-slate-800 
                               rounded-xl px-4 py-3 text-sm font-medium 
                               text-slate-900 dark:text-white
                               focus:ring-2 focus:ring-gold/40 focus:border-gold 
                               transition-all outline-none" style="color:#111827;">

                        <option value="">Select an aircraft…</option>

                        {% for plane in planes %}
                        <option value="{{ plane.id }}">
                            {{ plane.plane_id }} — {{ plane.model }} ({{ plane.capacity }} seats) — {{ plane.current_airport or 'Unknown' }}
                        </option>
                        {% endfor %}
                    </select>

                    {% if not planes %}
                    <p class="mt-2 text-xs text-amber-600 dark:text-amber-400">
                        ⚠️ No aircraft currently on ground. All planes are in flight or maintenance.
                    </p>
                    {% endif %}
                </div>

                <!-- Origin -->
                <div>
                    <label for="origin" 
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        Origin City
                    </label>

                    <input type="text" name="origin" id="origin" required 
                        placeholder="e.g. Karachi (KHI)"
                        class="w-full border border-slate-200 dark:border-slate-700
                               bg-white dark:bg-slate-800
                               rounded-xl px-4 py-3 text-sm 
                               text-slate-800 dark:text-white 
                               placeholder-slate-400 dark:placeholder-slate-500
                               focus:ring-2 focus:ring-gold/40 focus:border-gold 
                               transition-all outline-none">
                </div>

                <!-- Destination -->
                <div>
                    <label for="destination" 
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        Destination City
                    </label>

                    <input type="text" name="destination" id="destination" required 
                        placeholder="e.g. Lahore (LHE)"
                        class="w-full border border-slate-200 dark:border-slate-700
                               bg-white dark:bg-slate-800
                               rounded-xl px-4 py-3 text-sm 
                               text-slate-800 dark:text-white 
                               placeholder-slate-400 dark:placeholder-slate-500
                               focus:ring-2 focus:ring-gold/40 focus:border-gold 
                               transition-all outline-none">
                </div>

                <!-- Duration -->
                <div>
                    <label for="duration" 
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        Flight Duration
                    </label>

                    <input type="text" name="duration" id="duration" required 
                        placeholder="e.g. 2h 15m"
                        class="w-full border border-slate-200 dark:border-slate-700
                               bg-white dark:bg-slate-800
                               rounded-xl px-4 py-3 text-sm 
                               text-slate-800 dark:text-white 
                               placeholder-slate-400 dark:placeholder-slate-500
                               focus:ring-2 focus:ring-gold/40 focus:border-gold 
                               transition-all outline-none">
                </div>

                <!-- Departure -->
                <div>
                    <label for="departure_time" 
                        class="block text-xs font-bold uppercase tracking-wider text-slate-500 dark:text-slate-400 mb-2">
                        Departure Date & Time
                    </label>

                    <input type="datetime-local" name="departure_time" id="departure_time" required
                        class="w-full border border-slate-200 dark:border-slate-700
                               bg-white dark:bg-slate-800
                               rounded-xl px-4 py-3 text-sm 
                               text-slate-800 dark:text-white
                               focus:ring-2 focus:ring-gold/40 focus:border-gold 
                               transition-all outline-none">
                </div>

                <!-- Submit -->
                <div class="pt-3">
                    <button type="submit" id="submit-flight-btn"
                        class="w-full bg-navy hover:bg-navy-700 
                               text-white font-display font-bold text-sm 
                               py-3.5 rounded-xl 
                               transition-all duration-200 
                               shadow-sm hover:shadow-xl 
                               active:scale-[0.98]">
                        ✈️ Add Flight
                    </button>
                </div>

            </div>
        </form>
    </div>
</div>
{% endblock %}
