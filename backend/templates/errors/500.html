{% extends "base.html" %}
{% block title %}500 — Server Error{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
    <div class="text-8xl mb-6">⚠️</div>
    <h1 class="text-5xl font-display font-black text-slate-900 mb-3">500</h1>
    <h2 class="text-xl font-semibold text-slate-700 mb-2">Internal Server Error</h2>
    <p class="text-slate-500 text-sm max-w-sm mb-8">
        Something went wrong on our end. Our team has been notified. Please try again in a few moments.
    </p>
    <a href="{{ url_for('home') }}" id="back-home-500"
       class="inline-flex items-center gap-2 bg-navy hover:bg-navy-700 text-white font-semibold px-6 py-3 rounded-xl transition-all shadow-sm">
        ← Back to Home
    </a>
</div>
{% endblock %}
